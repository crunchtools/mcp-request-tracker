name: Feature Request
description: Suggest a new tool or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: I need to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the tool or change you'd like
      placeholder: |
        Tool name: `do_something`
        RT API endpoint: `GET/POST /REST/1.0/endpoint`
        Parameters: ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered?

  - type: dropdown
    id: scope
    attributes:
      label: Tool Category
      description: Which area does this feature belong to?
      options:
        - Search/View
        - Update
        - Time Tracking
        - Communication
        - Creation
        - Workflows
        - New Category
    validations:
      required: true

  - type: dropdown
    id: rt_api
    attributes:
      label: RT REST API Reference
      description: Does this correspond to an existing RT REST 1.0 API endpoint?
      options:
        - "Yes - documented in RT REST API"
        - "No - new behavior / aggregation"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information or examples
